default_backend: openai_compatible
api:
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  model: deepseek-v4-flash
  timeout_seconds: 60
  max_retries: 5
  temperature: 0.2
  response_format: json
local:
  enabled: false
mock:
  enabled: true
  deterministic: true
cache:
  dir: .cache/llm
trace:
  enabled: true
  path: data/processed/generation_trace.jsonl
